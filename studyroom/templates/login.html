{% extends "master.html" %}

{% block title %}Login - Study Crowd{% endblock %}

{% block content %}
<h1>Login</h1>
<p>Please log in to access your account.</p>
<form method="post" action="{% url 'Login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Login">
</form>
<p>For admin access, <a href="/admin/">click here to go to admin login</a>.</p>
{% endblock %}

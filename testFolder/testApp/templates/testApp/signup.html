{% extends 'testApp/base.html' %}

{% block title %}Sign Up | Study Room Finder{% endblock %}

{% block content %}
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to reserve study spaces and manage your bookings.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">Sign Up</button>
    </form>

    <p class="auth-link-text">
        Already have an account?
        <a href="{% url 'Login' %}">Login</a>
    </p>
{% endblock %}

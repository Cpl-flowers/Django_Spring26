{% extends 'testApp/base.html' %}

{% block title %}Login | Study Room Finder{% endblock %}

{% block content %}
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to view and reserve study spaces.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">Login</button>
    </form>

    <p class="auth-link-text">
        Do not have an account?
        <a href="{% url 'signup' %}">Sign Up</a>
    </p>
{% endblock %}

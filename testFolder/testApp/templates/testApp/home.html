<!DOCTYPE html>
<html>
<head>
    <title>Study Room Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        .navbar {
            background: white;
            border-bottom: 4px solid orange;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-box {
            background: #f97316;
            color: white;
            font-weight: bold;
            font-size: 32px;
            padding: 18px 28px;
            border-radius: 14px;
        }

        .brand-text h1 {
            margin: 0;
            font-size: 20px;
        }

        .brand-text p {
            margin: 4px 0 0;
            color: #555;
        }

        .nav-buttons a,
        .nav-buttons button {
            margin-left: 12px;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 16px;
            text-decoration: none;
            border: 2px solid #f97316;
            cursor: pointer;
        }

        .login-btn {
            background: #f97316;
            color: white;
        }

        .signup-btn {
            background: white;
            color: #f97316;
        }

        .logout-btn {
            background: white;
            color: #f97316;
        }

        .hero {
            padding: 40px;
        }

        .search-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .search-box input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border-radius: 12px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="brand">
            <div class="logo-box">UTRGV</div>
            <div class="brand-text">
                <h1>Study Room Finder</h1>
                <p>Find your perfect study space</p>
            </div>
        </div>

        <div class="nav-buttons">
            {% if user.is_authenticated %}
                <span>Hello, {{ user.username }}</span>
                <form action="/accounts/logout/" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            {% else %}
                <a href="/accounts/login/" class="login-btn">Login</a>
                <a href="/signup/" class="signup-btn">Sign Up</a>
            {% endif %}
        </div>
    </div>

    <div class="hero">
        <div class="search-box">
            <input type="text" placeholder="Search by campus, building, floor, or room number...">
        </div>
    </div>
</body>
</html>

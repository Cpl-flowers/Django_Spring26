<!DOCTYPE html>
<html>
<head>
    <title>Time Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

    <!-- HEADER -->
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-green-800">
            Room {{ room.number }}
        </h1>
        <p class="text-gray-600">
            Select your start and end time
        </p>

        {% if error %}
            <p class="text-red-500 mt-2 font-semibold">
                {{ error }}
            </p>
        {% endif %}
    </div>

    <!-- MAIN GRID -->
    <div class="grid md:grid-cols-3 gap-6">

        <!-- TIME GRID -->
        <div class="md:col-span-2">
            <div class="bg-white p-4 rounded-xl shadow">

                <div class="grid grid-cols-4 gap-3">

                    {% for hour in time_slots %}

                        <div
                            class="time-block border rounded-lg p-4 text-center font-medium transition

                            {% if hour in booked_hours %}
                                bg-red-200 text-gray-500 cursor-not-allowed opacity-60
                            {% else %}
                                bg-gray-50 hover:bg-yellow-200 cursor-pointer
                            {% endif %}

                            "
                            data-hour="{{ hour }}"
                        >
                            {{ hour }}:00
                        </div>

                    {% endfor %}

                </div>

            </div>
        </div>

        <!-- SUMMARY + FORM -->
        <div class="md:col-span-1">

            <form method="POST" class="bg-white rounded-xl shadow p-5">
                {% csrf_token %}

                <h2 class="text-lg font-semibold text-green-700 mb-4">
                    Your Selection
                </h2>

                <p class="text-gray-700">
                    Start: <span id="startTime">-</span>
                </p>

                <p class="text-gray-700">
                    End: <span id="endTime">-</span>
                </p>

                <!-- hidden inputs for backend -->
                <input type="hidden" name="start_time" id="startInput">
                <input type="hidden" name="end_time" id="endInput">

                <div class="mt-4 p-3 bg-green-50 rounded-lg">
                    <p class="text-green-800 font-bold">
                        Duration:
                        <span id="duration">0</span> hour(s)
                    </p>
                </div>

                <button type="submit"
                        class="mt-5 w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600">
                    Confirm Reservation
                </button>

            </form>

        </div>

    </div>
</div>

<!-- JAVASCRIPT -->
<script>
let selected = [];
const blocks = document.querySelectorAll(".time-block");

blocks.forEach(block => {

    block.addEventListener("click", () => {

        // ❌ ignore booked slots
        if (block.classList.contains("cursor-not-allowed")) return;

        const hour = parseInt(block.dataset.hour);

        // reset after 2 selections
        if (selected.length === 2) {
            selected = [];
            blocks.forEach(b => b.classList.remove("bg-yellow-200"));
        }

        selected.push(hour);
        selected.sort((a,b) => a-b);

        updateUI();
        highlight();
    });
});

function updateUI() {
    document.getElementById("startTime").innerText =
        selected[0] !== undefined ? selected[0] + ":00" : "-";

    document.getElementById("endTime").innerText =
        selected[1] !== undefined ? selected[1] + ":00" : "-";

    document.getElementById("duration").innerText =
        selected.length === 2 ? (selected[1] - selected[0]) : "0";

    document.getElementById("startInput").value = selected[0] || "";
    document.getElementById("endInput").value = selected[1] || "";
}

function highlight() {

    blocks.forEach(b => {
        b.classList.remove("bg-yellow-200");
    });

    if (selected.length === 2) {
        blocks.forEach(b => {
            let h = parseInt(b.dataset.hour);

            if (h >= selected[0] && h <= selected[1]) {
                b.classList.add("bg-yellow-200");
            }
        });
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Time Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

<div class="max-w-5xl mx-auto p-6">

    <!-- HEADER -->
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-green-800">
            Room {{ room.number }}
        </h1>
        <p class="text-gray-600">
            Select your start and end time
        </p>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="grid md:grid-cols-3 gap-6">

        <!-- TIME GRID -->
        <div class="md:col-span-2">

            <div class="bg-white p-4 rounded-xl shadow">

                <h2 class="text-lg font-semibold text-gray-700 mb-4">
                    Available Time Slots
                </h2>

                <div id="timeGrid" class="grid grid-cols-4 gap-3">

                    {% for hour in time_slots %}
                    <div
                        class="time-block border rounded-lg p-4 text-center cursor-pointer
                               bg-gray-50 hover:bg-gray-100 transition
                               font-medium text-gray-700"
                        data-hour="{{ hour }}"
                    >
                        {{ hour }}:00
                    </div>
                    {% endfor %}

                </div>

            </div>
        </div>

        <!-- SUMMARY CARD -->
        <div class="md:col-span-1">

            <div class="sticky top-6 bg-white rounded-xl shadow p-5">

                <h2 class="text-lg font-semibold text-green-700 mb-4">
                    Your Selection
                </h2>

                <p class="text-gray-700">
                    Start:
                    <span id="startTime" class="font-semibold">-</span>
                </p>

                <p class="text-gray-700 mt-2">
                    End:
                    <span id="endTime" class="font-semibold">-</span>
                </p>

                <div class="mt-4 p-3 bg-green-50 rounded-lg">
                    <p class="text-green-800 font-bold">
                        Duration:
                        <span id="duration">0</span> hour(s)
                    </p>
                </div>

                <button class="mt-5 w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600">
                    Confirm Reservation
                </button>

            </div>

        </div>

    </div>

</div>

<!-- JS LOGIC -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    let selected = [];
    const blocks = document.querySelectorAll(".time-block");

    blocks.forEach(block => {
        block.addEventListener("click", () => {

            const hour = parseInt(block.dataset.hour);

            if (selected.length === 2) {
                selected = [];
                blocks.forEach(b => {
                    b.classList.remove("bg-yellow-200", "border-orange-400");
                    b.classList.add("bg-gray-50");
                });
            }

            selected.push(hour);
            selected.sort((a, b) => a - b);

            updateUI();
            highlightRange();
        });
    });

    function updateUI() {
        document.getElementById("startTime").innerText =
            selected[0] !== undefined ? selected[0] + ":00" : "-";

        document.getElementById("endTime").innerText =
            selected[1] !== undefined ? selected[1] + ":00" : "-";

        document.getElementById("duration").innerText =
            selected.length === 2 ? (selected[1] - selected[0]) : "0";
    }

    function highlightRange() {

        blocks.forEach(b => {
            b.classList.remove("bg-yellow-200", "border-orange-400");
            b.classList.add("bg-gray-50");
        });

        if (selected.length === 2) {
            blocks.forEach(b => {
                const hour = parseInt(b.dataset.hour);

                if (hour >= selected[0] && hour <= selected[1]) {
                    b.classList.add("bg-yellow-200", "border-orange-400");
                    b.classList.remove("bg-gray-50");
                }
            });
        }
    }

});
</script>

</body>
</html>

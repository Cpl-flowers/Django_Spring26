<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--title is meant for the browser tab-->
<title>{% block title %}Study Crowd{% endblock %}</title>
<style>
    /* Reset default margins and paddings */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Navbar container */
    nav {
        background-color: #333;
        padding: 0.5rem 1rem;
    }

    /* Navbar list */
    nav ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
    }

    /* Navbar items */
    nav ul li {
        margin: 0 10px;
    }

    /* Navbar links */
    nav ul li a {
        color: white;
        text-decoration: none;
        padding: 8px 12px;
        display: block;
        transition: background 0.3s;
    }

    /* Hover effect */
    nav ul li a:hover {
        background-color: #575757;
        border-radius: 4px;
    }

    /* Responsive: stack items on small screens */
    @media (max-width: 600px) {
        nav ul {
            flex-direction: column;
            align-items: flex-start;
        }
        nav ul li {
            margin: 5px 0;
        }
    }
</style>
</head>
<body>

<!-- Navbar -->
<nav>
    <ul>
        <!-- URL patterns target the URL pattern name defined in urls.py, not the file name or path -->
        <li><a href="{% url 'Home' %}">Home</a></li>
        <li><a href="{% url 'About' %}">About</a></li>
        <li><a href="{% url 'Login' %}">Login</a></li>
        <li><a href="{% url 'Contact' %}">Contact</a></li>
        <!-- <li><a href="url 'Members'">Go to Members</a></li> -->
    </ul>
</nav>

<!-- Page content -->
{% block content %}{% endblock %}

</body>
</html>
